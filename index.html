<!doctype html>
<html class="light" lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - LuxeStay</title>
    
    <!-- Tailwind, Fuentes e Iconos (Heredados del Dashboard) -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
                "background": "#f6faf8",
                "secondary": "#4e6073",
                "error": "#ba1a1a",
                "surface-container-lowest": "#ffffff",
                "primary": "#006a63",
                "on-primary": "#ffffff",
                "outline-variant": "#bdc9c6",
                "surface-container-low": "#f0f5f3",
                "on-surface": "#171d1c"
            },
            fontFamily: {
                "sans": ["Plus Jakarta Sans", "sans-serif"]
            }
          }
        }
      }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
    </style>
  </head>
  <body class="bg-background text-on-surface min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

    <!-- Fondo decorativo sutil -->
    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-3xl"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-secondary/5 rounded-full blur-3xl"></div>

    <!-- Contenedor del Login -->
    <div class="bg-surface-container-lowest w-full max-w-md p-8 sm:p-10 rounded-[24px] shadow-[0px_8px_30px_rgba(0,0,0,0.04)] border border-outline-variant/30 relative z-10">
        
        <!-- Encabezado / Logo -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-primary/10 rounded-2xl mb-4 text-primary">
                <span class="material-symbols-outlined text-4xl" data-icon="hotel">hotel</span>
            </div>
            <h1 class="text-3xl font-bold text-primary tracking-tight mb-1">LuxeStay</h1>
            <p class="text-xs font-bold tracking-[0.15em] text-secondary uppercase opacity-80">Gestión Boutique</p>
        </div>

        <!-- Alerta de Error -->
        <div id="errorAlert" class="hidden flex items-center gap-2 bg-error/10 border border-error/20 text-error px-4 py-3 rounded-lg mb-6 text-sm transition-all">
            <span class="material-symbols-outlined text-[20px]">error</span>
            <span id="errorMessage">Credenciales incorrectas.</span>
        </div>

        <!-- Formulario -->
        <form id="loginForm" class="space-y-5">
            <!-- Usuario -->
            <div>
                <label for="username" class="block text-sm font-semibold text-secondary mb-1.5">Usuario</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3.5 top-1/2 -translate-y-1/2 text-secondary/60">person</span>
                    <input 
                        type="text" 
                        id="username" 
                        required 
                        class="w-full pl-11 pr-4 py-3 bg-surface-container-low border border-outline-variant/50 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary focus:bg-surface-container-lowest outline-none transition-all text-sm"
                        placeholder="Ingresa tu usuario"
                    >
                </div>
            </div>

            <!-- Contraseña -->
            <div>
                <label for="password" class="block text-sm font-semibold text-secondary mb-1.5">Contraseña</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3.5 top-1/2 -translate-y-1/2 text-secondary/60">lock</span>
                    <input 
                        type="password" 
                        id="password" 
                        required 
                        class="w-full pl-11 pr-4 py-3 bg-surface-container-low border border-outline-variant/50 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary focus:bg-surface-container-lowest outline-none transition-all text-sm"
                        placeholder="••••••••"
                    >
                </div>
            </div>

            <!-- Botón Submit -->
            <button 
                type="submit" 
                id="submitBtn"
                class="w-full py-3.5 mt-2 bg-primary text-on-primary font-bold rounded-xl shadow-[0px_4px_12px_rgba(0,106,99,0.2)] hover:bg-primary/90 hover:shadow-[0px_6px_16px_rgba(0,106,99,0.3)] active:scale-[0.98] transition-all flex items-center justify-center gap-2"
            >
                Iniciar Sesión
                <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
            </button>
        </form>
    </div>
    <script src="main.js" type="module">      
    </script>
  </body>
</html>
